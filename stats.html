<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --text-muted: #8b949e;
      --accent-color: #58a6ff;
      --border-color: #30363d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      width: 100%;
      display: none; /* Hidden until auth */
    }

    .header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .auth-container {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin-top: 10vh;
    }

    .auth-container h2 {
      margin-bottom: 1rem;
      font-size: 1.25rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      margin-bottom: 1rem;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: var(--accent-color);
    }

    button {
      background-color: #238636;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #2ea043;
    }

    button:disabled {
      background-color: #23863680;
      cursor: not-allowed;
    }

    .error-msg {
      color: #f85149;
      margin-top: 1rem;
      font-size: 0.875rem;
      display: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .stat-title {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent-color);
    }

    .chart-container {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
      width: 100%;
      height: 400px;
    }

    .loader {
      display: none;
      margin: 2rem auto;
      border: 3px solid var(--border-color);
      border-top: 3px solid var(--accent-color);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Auth Form -->
  <div class="auth-container" id="auth-container">
    <h2>Analytics Login</h2>
    <form id="auth-form">
      <input type="password" id="pwd" placeholder="Enter password" required autofocus>
      <button type="submit" id="submit-btn" aria-label="Login">Login</button>
      <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>
    </form>
  </div>

  <div class="loader" id="loader"></div>

  <!-- Dashboard Container -->
  <div class="container" id="dashboard-container">
    <div class="header">
      <h1>Dashboard</h1>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">Today</div>
        <div class="stat-value" id="stat-today">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">This Week</div>
        <div class="stat-value" id="stat-week">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">This Month</div>
        <div class="stat-value" id="stat-month">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">All Time</div>
        <div class="stat-value" id="stat-total">-</div>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="visitsChart"></canvas>
    </div>
  </div>

  <script>
    const authForm = document.getElementById('auth-form');
    const pwdInput = document.getElementById('pwd');
    const submitBtn = document.getElementById('submit-btn');
    const authContainer = document.getElementById('auth-container');
    const dashboardContainer = document.getElementById('dashboard-container');
    const errorMsg = document.getElementById('error-msg');
    const loader = document.getElementById('loader');

    // Retrieve saved password from sessionStorage if available
    document.addEventListener("DOMContentLoaded", () => {
      const savedPwd = sessionStorage.getItem('stats_pwd');
      if (savedPwd) {
        pwdInput.value = savedPwd;
        loadStats(savedPwd);
      }
    });

    authForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const pwd = pwdInput.value;
      if (!pwd) return;
      loadStats(pwd);
    });

    async function loadStats(pwd) {
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying...';
      loader.style.display = 'block';

      try {
        const response = await fetch(`/api/stats?pwd=${encodeURIComponent(pwd)}`);
        
        if (response.status === 401) {
          sessionStorage.removeItem('stats_pwd');
          throw new Error('Unauthorized');
        }
        
        if (!response.ok) {
          throw new Error('Server error');
        }

        const data = await response.json();
        
        // Save auth state for this session
        sessionStorage.setItem('stats_pwd', pwd);
        
        // Hide auth, show dashboard
        authContainer.style.display = 'none';
        dashboardContainer.style.display = 'block';

        // Populate stats
        document.getElementById('stat-today').textContent = data.today.toLocaleString();
        document.getElementById('stat-week').textContent = data.week.toLocaleString();
        document.getElementById('stat-month').textContent = data.month.toLocaleString();
        document.getElementById('stat-total').textContent = data.total.toLocaleString();

        // Render chart
        renderChart(data.dailyChart);

      } catch (err) {
        if (err.message === 'Unauthorized') {
          errorMsg.style.display = 'block';
          pwdInput.value = '';
          pwdInput.focus();
        } else {
          errorMsg.textContent = 'An error occurred while fetching stats.';
          errorMsg.style.display = 'block';
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
        loader.style.display = 'none';
      }
    }

    let chartInstance = null;

    function renderChart(dailyData) {
      const ctx = document.getElementById('visitsChart').getContext('2d');
      
      const labels = dailyData.map(d => d.date);
      const dataPoints = dailyData.map(d => d.visits);

      if (chartInstance) {
        chartInstance.destroy();
      }

      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Visits',
            data: dataPoints,
            backgroundColor: '#58a6ff80',
            borderColor: '#58a6ff',
            borderWidth: 1,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: '#161b22',
              titleColor: '#c9d1d9',
              bodyColor: '#c9d1d9',
              borderColor: '#30363d',
              borderWidth: 1,
              padding: 12,
              displayColors: false,
              callbacks: {
                title: (context) => {
                  return dailyData[context[0].dataIndex].fullDate;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                precision: 0,
                color: '#8b949e'
              },
              grid: {
                color: '#30363d'
              },
              border: {
                dash: [4, 4]
              }
            },
            x: {
              ticks: {
                color: '#8b949e'
              },
              grid: {
                display: false
              }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
